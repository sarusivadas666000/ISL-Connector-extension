<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ISL-Connect Panel</title>
  <style>
    body {
      width: 100%;
      margin: 0;
      padding: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #141414;
      color: #ffffff;
      box-sizing: border-box;
    }
    .container { display: flex; flex-direction: column; gap: 15px; }
    h3 { margin: 0; color: #f1c40f; text-align: center; letter-spacing: 1px; }
    
    /* Dedicated Local Video Feed Box */
    #camera-view {
      width: 100%;
      height: 220px;
      background: #2c3e50;
      border-radius: 8px;
      border: 2px solid #34495e;
      transform: scaleX(-1); /* Mirrors the screen for intuitive left/right signing */
    }
    
    .display-box {
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 6px;
      min-height: 45px;
      box-sizing: border-box;
    }
    #subtitle-output { color: #2ecc71; font-size: 18px; font-weight: bold; }
    #status-msg { color: #bdc3c7; font-size: 13px; }
    
    select, button {
      width: 100%;
      padding: 12px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
    }
    button { background: #27ae60; cursor: pointer; transition: 0.2s; }
    button:hover { background: #2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <h3>ISL-CONNECT PANEL</h3>
    
    <video id="camera-view" autoplay playsinline></video>
    
    <div>
      <label style="font-size: 12px; color: #95a5a6;">SYSTEM STATUS:</label>
      <div id="status-msg" class="display-box">Initializing hardware stream...</div>
    </div>

    <div>
      <label style="font-size: 12px; color: #95a5a6;">TRANSLATED ISL SUBTITLES:</label>
      <div id="subtitle-output" class="display-box">Waiting for gesture sequence...</div>
    </div>

    <label style="font-size: 12px; color: #95a5a6;">TARGET TRANSLATION LANGUAGE:</label>
    <select id="lang">
      <option value="ml">Malayalam (മലയാളം)</option>
      <option value="ta">Tamil (தமிழ்)</option>
      <option value="en">English</option>
    </select>
    
    <button id="startPipelineBtn">Start Translation Loop</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
  <script src="panel.js"></script>
</body>
</html>
